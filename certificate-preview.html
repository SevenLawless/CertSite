<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة الشهادة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { padding: 20px; background: #f5f5f5; }
        .preview-header {
            text-align: center;
            margin-bottom: 20px;
            color: #db5c29;
            font-size: 1.2rem;
        }
        .preview-header a { color: #db5c29; }
        #certificate-preview-container {
            max-width: 100%;
            overflow-x: auto;
            text-align: center;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
        }
        #certificate-preview-container canvas {
            max-width: 100%;
            height: auto !important;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="preview-header">
        <strong>معاينة الشهادة</strong> — عدّل القالب أو السكربت ثم حدّث الصفحة لرؤية التغييرات مباشرة.
        <br>
        <a href="index.html">← العودة إلى المولد</a>
    </div>
    <div id="certificate-preview-container"></div>

    <script src="script.js"></script>

</html>
